<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sport | Fotografie Portfolio</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;600;800&family=Plus+Jakarta+Sans:wght@500;700;800&family=Italianno&family=Syne:wght@400;700;800&family=Caveat:wght@400;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background: #f5f1ed;
            color: #2d2d2d;
        }

        .gallery-hero {
            background: #f5f1ed;
            padding: 120px 0 60px;
            color: #b32c24;
        }

        .container-thin {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px;
        }

        .back-nav {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 100;
        }

        .btn-back {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f5f1ed;
            color: #b32c24;
            padding: 12px 24px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
            text-decoration: none;
        }

        .btn-back:hover {
            transform: translateX(-5px);
            background: #000;
            color: #fff;
        }

        .photo-masonry {
            columns: 3;
            column-gap: 20px;
            padding: 40px 0 100px;
        }

        @media (max-width: 900px) {
            .photo-masonry {
                columns: 2;
                column-gap: 15px;
            }
        }

        @media (max-width: 600px) {
            .photo-masonry {
                columns: 1;
            }
        }

        .photo-card {
            break-inside: avoid;
            margin-bottom: 15px;
            border-radius: 8px;
            overflow: hidden;
            background: #fdfde0;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            cursor: zoom-in;
        }

        .photo-card img {
            width: 100%;
            display: block;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .photo-card:hover {
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            z-index: 10;
        }

        .photo-card:hover img {
            transform: scale(1.05);
        }
    </style>
</head>

<body><div class="grainy-overlay"></div>
    <div class="back-nav">
        <a href="index.html#photo-sport" class="btn-back">
            <i data-lucide="arrow-left"></i> Zurück zum Portfolio
        </a>
    </div>

    <header class="gallery-hero">
        <div class="container-thin">
            <div class="badge" style="margin-bottom: 20px;">Fotografie</div>
            <h1
                style="font-size: clamp(3rem, 8vw, 5rem); font-family: 'Fraunces', serif; font-size: clamp(3.5rem, 15vw, 8rem); font-weight: 900; line-height: 0.9; letter-spacing: -4px; margin-bottom: 20px; color: #b32c24;">
                Sport.
            </h1>
            <p style="font-size: 1.2rem; max-width: 600px; color: rgba(255, 255, 255, 0.7); font-weight: 500;">
                Energie, Dynamik und der perfekt eingefrorene Moment der Bewegung.
            </p>
        </div>
    </header>

    <!-- Animated Photography Ticker -->
    <div class="skills-bar" style="margin-top: 0; border-top: 0; background: #f5f1ed; color: #b32c24;">
        <div class="skills-track">
            <div class="skill-item" style="color: #b32c24;"><i data-lucide="zap"></i> Motion Focus</div>
            <div class="skill-separator" style="background: rgba(255, 255, 255, 0.3);"></div>
            <div class="skill-item" style="color: #b32c24;"><i data-lucide="timer"></i> Fast Shutter</div>
            <div class="skill-separator" style="background: rgba(255, 255, 255, 0.3);"></div>
            <div class="skill-item" style="color: #b32c24;"><i data-lucide="target"></i> Precision</div>
            <div class="skill-separator" style="background: rgba(255, 255, 255, 0.3);"></div>
            <div class="skill-item" style="color: #b32c24;"><i data-lucide="flame"></i> Energy</div>
            <div class="skill-separator" style="background: rgba(255, 255, 255, 0.3);"></div>

            <!-- Loop 2 -->
            <div class="skill-item" style="color: #b32c24;"><i data-lucide="zap"></i> Motion Focus</div>
            <div class="skill-separator" style="background: rgba(255, 255, 255, 0.3);"></div>
            <div class="skill-item" style="color: #b32c24;"><i data-lucide="timer"></i> Fast Shutter</div>
            <div class="skill-separator" style="background: rgba(255, 255, 255, 0.3);"></div>
            <div class="skill-item" style="color: #b32c24;"><i data-lucide="target"></i> Precision</div>
            <div class="skill-separator" style="background: rgba(255, 255, 255, 0.3);"></div>
            <div class="skill-item" style="color: #b32c24;"><i data-lucide="flame"></i> Energy</div>
            <div class="skill-separator" style="background: rgba(255, 255, 255, 0.3);"></div>
        </div>
    </div>

    <main class="container-thin">
        <div class="photo-masonry">
            <!-- First item with our real photo -->
            <div class="photo-card">
                <img src="assets/sport_photo.jpg" alt="Sport Fotografie">
            </div>

            <!-- Placeholders for more sport photos -->
            <div class="photo-card">
                <img src="assets/project_mockup.jpg" alt="Sport 2" style="filter: grayscale(0.2) contrast(1.2);">
            </div>

            <div class="photo-card">
                <img src="assets/sport_photo.jpg" alt="Sport 3">
            </div>

            <div class="photo-card">
                <img src="assets/project_mockup.jpg" alt="Sport 4" style="filter: brightness(1.1);">
            </div>

            <div class="photo-card">
                <img src="assets/sport_photo.jpg" alt="Sport 5">
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-container">
            <div class="footer-row footer-top">
                <span class="footer-label">Theresia Hentschel</span>
                <a href="mailto:theresiahentschel154@gmail.com" class="footer-label underline">theresiahentschel154@gmail.com</a>
            </div>
            <div class="footer-big-brand">
                <h2 class="reveal outline-text">Theresia Hent</h2>
            </div>
            <div class="footer-divider"></div>
            <div class="footer-row footer-bottom">
                <span class="footer-label">TH © 2024</span>
                <div style="display: flex; gap: 20px;">
                    <a href="#" class="footer-label underline">Impressum</a>
                    <a href="#" class="footer-label underline">Datenschutz</a>
                </div>
            </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // lucide.createIcons(); // Now handled in script.js
    </script>
</body>

</html>
